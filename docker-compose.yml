name: nexusintel

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexusintel-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexusintel}
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexusintel}"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nexusintel-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: nexusintel-api:latest
    container_name: nexusintel-api
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus}@postgres:5432/${POSTGRES_DB:-nexusintel}
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: "*"
      NEXUS_ADMIN_USER: ${NEXUS_ADMIN_USER:-admin}
      NEXUS_ADMIN_PASSWORD: ${NEXUS_ADMIN_PASSWORD:-nexusintel}
      NEXUS_AUTH_SECRET: ${NEXUS_AUTH_SECRET:-change-this-local-secret}
      NEXUS_LLM_PROVIDER: ${NEXUS_LLM_PROVIDER:-local}
      NEXUS_LLM_ENDPOINT: ${NEXUS_LLM_ENDPOINT:-http://localhost:11434}
      NEXUS_LLM_MODEL: ${NEXUS_LLM_MODEL:-llama3.1}
      NEXUS_LLM_API_KEY: ${NEXUS_LLM_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      INTELX_API_KEY: ${INTELX_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      NEXUS_EGRESS_PROXY: ${NEXUS_EGRESS_PROXY:-}
      NEXUS_PLATFORM_CATALOG: ${NEXUS_PLATFORM_CATALOG:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker-network:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: nexusintel-api:latest
    container_name: nexusintel-worker-network
    command: ["celery", "-A", "tasks.celery_app", "worker", "--loglevel=INFO", "--queues=network_io,default", "--concurrency=${NETWORK_WORKER_CONCURRENCY:-2}"]
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus}@postgres:5432/${POSTGRES_DB:-nexusintel}
      REDIS_URL: redis://redis:6379/0
      NEXUS_ENV: ${NEXUS_ENV:-production}
      NEXUS_EGRESS_PROXY: ${NEXUS_EGRESS_PROXY:-}
      NEXUS_PROXY_POOL: ${NEXUS_PROXY_POOL:-}
      NEXUS_PLATFORM_CATALOG: ${NEXUS_PLATFORM_CATALOG:-}
      NEXUS_SERVERLESS_INVOKER_URL: ${NEXUS_SERVERLESS_INVOKER_URL:-}
      NEXUS_SERVERLESS_INVOKER_TOKEN: ${NEXUS_SERVERLESS_INVOKER_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  worker-ml:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: nexusintel-api:latest
    container_name: nexusintel-worker-ml
    command: ["celery", "-A", "tasks.celery_app", "worker", "--loglevel=INFO", "--queues=ml_gpu", "--concurrency=${ML_WORKER_CONCURRENCY:-1}"]
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus}@postgres:5432/${POSTGRES_DB:-nexusintel}
      REDIS_URL: redis://redis:6379/0
      NEXUS_ENV: ${NEXUS_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: nexusintel-api:latest
    container_name: nexusintel-celery-beat
    command: ["celery", "-A", "tasks.celery_app", "beat", "--loglevel=INFO"]
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus}@postgres:5432/${POSTGRES_DB:-nexusintel}
      REDIS_URL: redis://redis:6379/0
      NEXUS_ENV: ${NEXUS_ENV:-production}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  y-websocket:
    build:
      context: ./frontend
      dockerfile: Dockerfile.yjs
    image: nexusintel-y-websocket:latest
    container_name: nexusintel-y-websocket
    ports:
      - "${YJS_HOST:-127.0.0.1}:${YJS_PORT:-1234}:1234"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: nexusintel-frontend:latest
    container_name: nexusintel-frontend
    ports:
      - "${NEXUS_HOST:-127.0.0.1}:${NEXUS_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
      y-websocket:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 8
    restart: unless-stopped
