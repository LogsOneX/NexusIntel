name: nexusrecon

services:
  nexusrecon:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexusrecon:latest
    container_name: nexusrecon
    command: ["python", "main.py", "--no-banner", "dashboard", "0.0.0.0:8080"]
    ports:
      - "${NEXUS_HOST:-127.0.0.1}:${NEXUS_PORT:-8080}:8080"
    environment:
      PYTHONUNBUFFERED: "1"
      NEXUS_MODE: "${NEXUS_MODE:-standard}"
    volumes:
      - ./results:/app/results
      - ./reports:/app/reports
      - ./.nexusrecon:/app/.nexusrecon
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
